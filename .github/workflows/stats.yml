name: GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          path: github-readme-stats.svg
          token: ${{ secrets.GH_PAYLOAD_TOKEN }}
          options: username=guilhermefelipetto&show_icons=true&theme=transparent&hide_border=true&include_all_commits=true&count_private=true&rank_icon=github&custom_title=Development%20Analytics&exclude_repo=Prova01MLOps,projeto_aviario,MlFlow-Class

      - name: Generate Languages Card (legacy / unused in README)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          path: top-langs.svg
          token: ${{ secrets.GH_PAYLOAD_TOKEN }}
          options: username=guilhermefelipetto&theme=transparent&hide_border=true&langs_count=10&hide=html,css,scss,jupyter%20notebook&layout=compact

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add *.svg
          git commit -m "Update GitHub Stats" || exit 0
          git pull --rebase origin main
          git push

  update-languages:
    runs-on: ubuntu-latest
    needs: update-stats

    steps:

      # DEBUG: mostra tudo que o token consegue enxergar
      - name: Show repositories visible to token
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAYLOAD_TOKEN }}
          script: |
            const repos = await github.paginate(
              github.rest.repos.listForAuthenticatedUser,
              {
                affiliation: "owner,collaborator,organization_member",
                per_page: 100
              }
            );

            console.log("=================================");
            console.log("TOTAL REPOSITORIES:", repos.length);
            console.log("=================================");

            repos.forEach(r => {
              console.log(
                `${r.full_name} | private=${r.private}`
              );
            });

      - name: Languages by contribution (metrics)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_PAYLOAD_TOKEN }}

          filename: top-langs-metrics.svg
          base: ""
          config_timezone: America/Sao_Paulo

          output_action: commit
          committer_branch: main
          committer_message: "Update Languages (metrics)"

          repositories: 200
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: yes

          plugin_languages: yes
          plugin_languages_indepth: yes

          plugin_languages_recent_load: 1000
          plugin_languages_recent_days: 730

          plugin_languages_sections: most-used
          plugin_languages_details: percentage

          plugin_languages_limit: 20
          plugin_languages_threshold: 0.01%

          plugin_languages_colors: github

          plugin_languages_ignored: html, css, scss, jupyter notebook, tex, makefile, dockerfile

          plugin_languages_analysis_timeout: 120
          plugin_languages_analysis_timeout_repositories: 60

          # DEBUG
          debug: yes
          debug_flags: metrics
