name: GitHub Stats
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          path: github-readme-stats.svg
          token: ${{ secrets.GH_PAYLOAD_TOKEN }}
          options: username=guilhermefelipetto&show_icons=true&theme=transparent&hide_border=true&include_all_commits=true&count_private=true&rank_icon=github&custom_title=Development%20Analytics&exclude_repo=Prova01MLOps,projeto_aviario,MlFlow-Class

      - name: Generate Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          path: top-langs.svg
          token: ${{ secrets.GH_PAYLOAD_TOKEN }}
          options: username=guilhermefelipetto&theme=transparent&hide_border=true&langs_count=10&hide=html,css,scss,jupyter%20notebook&layout=compact

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add *.svg
          git commit -m "Update GitHub Stats" || exit 0
          git pull --rebase origin main
          git push
